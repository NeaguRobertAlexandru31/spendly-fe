<div class="rounded-[var(--r-xl)] p-8 max-w-[480px]" style="background:var(--surface);box-shadow:var(--sh-md)">

  <h2 class="text-[20px] font-extrabold mb-1" style="letter-spacing:-.02em;color:var(--text)">Cambia password</h2>
  <p class="text-[14px] mb-6" style="color:var(--text-2)">Scegli una password sicura di almeno 8 caratteri.</p>

  @if (success()) {
    <div class="flex items-center gap-3 px-4 py-3 rounded-[var(--r-md)]"
         style="background:var(--pos-soft);color:var(--pos);animation:popIn .3s ease">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12.5 10 17 19 7"/>
      </svg>
      <span class="text-[14px] font-semibold">Password aggiornata con successo.</span>
    </div>
  } @else {
    <form (ngSubmit)="submit()" class="flex flex-col gap-4">
      <!-- password corrente -->
      <div class="flex flex-col gap-1.5">
        <label class="text-[13.5px] font-semibold" style="color:var(--text)">Password corrente</label>
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none" width="16" height="16"
               viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"
               style="stroke:var(--text-3)">
            <rect x="4" y="10" width="16" height="11" rx="2.5"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/>
          </svg>
          <input [type]="showCurrent() ? 'text' : 'password'"
                 [ngModel]="currentPassword()" (ngModelChange)="currentPassword.set($event)"
                 name="currentPassword" placeholder="••••••••" required autocomplete="current-password"
                 class="w-full pl-9 pr-10 py-2.5 rounded-[var(--r-md)] text-[14.5px] outline-none"
                 style="background:var(--bg);border:1.5px solid var(--border-strong);color:var(--text)">
          <button type="button" (click)="showCurrent.set(!showCurrent())"
                  class="absolute right-2.5 top-1/2 -translate-y-1/2 p-1 rounded-md"
                  style="color:var(--text-3)">
            @if (showCurrent()) {
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 3l18 18M10.6 10.6a3 3 0 0 0 4.2 4.2M9.4 5.2A9.7 9.7 0 0 1 12 5c6.5 0 10 7 10 7a17 17 0 0 1-3.6 4.3M6.2 6.2A17 17 0 0 0 2 12s3.5 7 10 7a9.7 9.7 0 0 0 3-.5"/>
              </svg>
            } @else {
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            }
          </button>
        </div>
      </div>

      <!-- nuova password -->
      <div class="flex flex-col gap-1.5">
        <label class="text-[13.5px] font-semibold" style="color:var(--text)">Nuova password</label>
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none" width="16" height="16"
               viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"
               style="stroke:var(--text-3)">
            <rect x="4" y="10" width="16" height="11" rx="2.5"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/>
          </svg>
          <input [type]="showNew() ? 'text' : 'password'"
                 [ngModel]="newPassword()" (ngModelChange)="newPassword.set($event)"
                 name="newPassword" placeholder="Almeno 8 caratteri" required minlength="8" autocomplete="new-password"
                 class="w-full pl-9 pr-10 py-2.5 rounded-[var(--r-md)] text-[14.5px] outline-none"
                 style="background:var(--bg);border:1.5px solid var(--border-strong);color:var(--text)">
          <button type="button" (click)="showNew.set(!showNew())"
                  class="absolute right-2.5 top-1/2 -translate-y-1/2 p-1 rounded-md"
                  style="color:var(--text-3)">
            @if (showNew()) {
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 3l18 18M10.6 10.6a3 3 0 0 0 4.2 4.2M9.4 5.2A9.7 9.7 0 0 1 12 5c6.5 0 10 7 10 7a17 17 0 0 1-3.6 4.3M6.2 6.2A17 17 0 0 0 2 12s3.5 7 10 7a9.7 9.7 0 0 0 3-.5"/>
              </svg>
            } @else {
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            }
          </button>
        </div>
      </div>

      @if (error()) {
        <p class="text-[13.5px] px-3 py-2 rounded-[var(--r-sm)]"
           style="background:var(--neg-soft);color:var(--neg)">{{ error() }}</p>
      }

      <button type="submit" [disabled]="loading()"
              class="w-full py-3 rounded-[var(--r-md)] text-[15px] font-bold text-white transition-opacity disabled:opacity-60 mt-1"
              style="background:var(--accent)">
        {{ loading() ? 'Salvataggio...' : 'Aggiorna password' }}
      </button>
    </form>
  }
</div>
