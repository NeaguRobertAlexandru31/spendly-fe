<div class="flex min-h-screen items-center justify-center px-6 py-10" style="background:var(--bg)">
  <div class="w-full max-w-[400px]" style="animation:fadeUp .4s ease">

    <div class="flex items-center gap-2.5 mb-8">
      <div class="flex-none grid place-items-center rounded-[30%]"
           style="width:28px;height:28px;background:linear-gradient(140deg,var(--accent),#8b6ff0);box-shadow:var(--sh-accent)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 17l5-5 4 3 7-8"/><path d="M20 7h-4M20 7v4"/>
        </svg>
      </div>
      <span class="text-lg font-extrabold" style="letter-spacing:-.02em;color:var(--text)">Spendly</span>
    </div>

    @if (!success()) {
      <a routerLink="/auth/forgot-password"
         class="inline-flex items-center gap-1.5 text-[14px] font-semibold mb-6"
         style="color:var(--text-2)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="m15 6-6 6 6 6"/>
        </svg>
        Indietro
      </a>

      <h1 class="text-[27px] font-extrabold mb-1.5" style="letter-spacing:-.02em;color:var(--text)">Nuova password</h1>
      <p class="text-[15px] mb-7 leading-relaxed" style="color:var(--text-2)">
        Inserisci il codice ricevuto via email e scegli una nuova password.
      </p>

      <form (ngSubmit)="submit()" class="flex flex-col gap-4">
        @if (!email()) {
          <div class="flex flex-col gap-1.5">
            <label class="text-[13.5px] font-semibold" style="color:var(--text)">Email</label>
            <input type="email" name="email" [ngModel]="email()" (ngModelChange)="email.set($event)"
                   placeholder="nome@email.it" required autocomplete="email"
                   class="w-full px-3 py-2.5 rounded-[var(--r-md)] text-[14.5px] outline-none"
                   style="background:var(--surface);border:1.5px solid var(--border-strong);color:var(--text)">
          </div>
        }

        <div class="flex flex-col gap-1.5">
          <label class="text-[13.5px] font-semibold" style="color:var(--text)">Codice di recupero</label>
          <input type="text" name="code" [ngModel]="code()" (ngModelChange)="code.set($event)"
                 placeholder="000000" maxlength="6" required autocomplete="one-time-code"
                 class="w-full px-3 py-3 rounded-[var(--r-md)] text-[22px] font-bold text-center tracking-[.3em] outline-none"
                 style="background:var(--surface);border:1.5px solid var(--border-strong);color:var(--text)">
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-[13.5px] font-semibold" style="color:var(--text)">Nuova password</label>
          <div class="relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none" width="16" height="16"
                 viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"
                 style="stroke:var(--text-3)">
              <rect x="4" y="10" width="16" height="11" rx="2.5"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/>
            </svg>
            <input [type]="showPassword() ? 'text' : 'password'" name="password"
                   [ngModel]="password()" (ngModelChange)="password.set($event)"
                   placeholder="Almeno 8 caratteri" required minlength="8" autocomplete="new-password"
                   class="w-full pl-9 pr-10 py-2.5 rounded-[var(--r-md)] text-[14.5px] outline-none"
                   style="background:var(--surface);border:1.5px solid var(--border-strong);color:var(--text)">
            <button type="button" (click)="showPassword.set(!showPassword())"
                    class="absolute right-2.5 top-1/2 -translate-y-1/2 p-1 rounded-md"
                    style="color:var(--text-3)">
              @if (showPassword()) {
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M3 3l18 18M10.6 10.6a3 3 0 0 0 4.2 4.2M9.4 5.2A9.7 9.7 0 0 1 12 5c6.5 0 10 7 10 7a17 17 0 0 1-3.6 4.3M6.2 6.2A17 17 0 0 0 2 12s3.5 7 10 7a9.7 9.7 0 0 0 3-.5"/>
                </svg>
              } @else {
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              }
            </button>
          </div>
        </div>

        @if (error()) {
          <p class="text-[13.5px] px-3 py-2 rounded-[var(--r-sm)]"
             style="background:var(--neg-soft);color:var(--neg)">{{ error() }}</p>
        }

        <button type="submit" [disabled]="loading()"
                class="w-full py-3 rounded-[var(--r-md)] text-[15px] font-bold text-white transition-opacity disabled:opacity-60 mt-1"
                style="background:var(--accent)">
          {{ loading() ? 'Salvataggio...' : 'Reimposta password' }}
        </button>
      </form>

    } @else {
      <div style="animation:popIn .3s ease">
        <div class="grid place-items-center w-[56px] h-[56px] rounded-full mb-4"
             style="background:var(--pos-soft);color:var(--pos)">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12.5 10 17 19 7"/>
          </svg>
        </div>
        <h1 class="text-[27px] font-extrabold mb-1.5" style="letter-spacing:-.02em;color:var(--text)">Password reimpostata!</h1>
        <p class="text-[15px] mb-7 leading-relaxed" style="color:var(--text-2)">
          La tua password è stata aggiornata. Accedi con le nuove credenziali.
        </p>
        <a routerLink="/auth/login"
           class="block w-full py-3 rounded-[var(--r-md)] text-[15px] font-bold text-white text-center"
           style="background:var(--accent)">
          Vai al login
        </a>
      </div>
    }
  </div>
</div>
