<div class="flex flex-col gap-2.5 min-w-0 p-5"
  style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-sm)">

  <div class="flex justify-between items-start">
    <span class="text-[13.5px] font-semibold" style="color:var(--text-2)">{{ label() }}</span>
    @if (iconPath()) {
      <div class="w-8 h-8 grid place-items-center shrink-0"
        [style.color]="iconColor()"
        style="border-radius:var(--r-sm);background:var(--surface-2)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path [attr.d]="iconPath()"/>
        </svg>
      </div>
    }
  </div>

  <div class="tnum text-[30px] font-extrabold leading-none tracking-tight" style="color:var(--text)">
    {{ value() }}
  </div>

  @if (progressValue() !== null && progressMax() !== null) {
    <div class="h-[7px] rounded-full overflow-hidden" style="background:var(--surface-3)">
      <div class="h-full rounded-full transition-[width] duration-500"
        [style.width.%]="progressPct()"
        [style.background]="progressOver() ? 'var(--neg)' : 'var(--accent)'">
      </div>
    </div>
  }

  @if (subText()) {
    <div class="text-[12.5px]" style="color:var(--text-3)">
      {{ subText() }}
      @if (subValue()) {
        <strong class="tnum font-semibold" style="color:var(--text-2)">{{ subValue() }}</strong>
      }
    </div>
  }

</div>
