<div class="flex flex-col gap-2.5 p-4 md:p-5 h-full min-h-[130px] md:min-h-[148px]"
  style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-sm)">

  <!-- header: label + icona -->
  <div class="flex justify-between items-start">
    <span class="text-[13.5px] font-semibold leading-snug" style="color:var(--text-2)">{{ label() }}</span>
    @if (iconPath()) {
      <div class="w-9 h-9 grid place-items-center shrink-0 rounded-[10px]"
        [style.background]="iconBg()"
        [style.color]="iconColor()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path [attr.d]="iconPath()"/>
        </svg>
      </div>
    }
  </div>

  <!-- valore principale -->
  <div class="tnum text-[22px] md:text-[28px] font-extrabold leading-none tracking-tight" style="color:var(--text)">
    {{ value() }}
  </div>

  <!-- area inferiore: progress bar OPPURE trend badge + subText -->
  <div class="flex flex-col gap-2 mt-auto">

    @if (progressValue() !== null && progressMax() !== null) {
      <div class="h-[6px] rounded-full overflow-hidden" style="background:var(--surface-3)">
        <div class="h-full rounded-full transition-[width] duration-500"
          [style.width.%]="progressPct()"
          [style.background]="progressOver() ? 'var(--neg, #ef4444)' : 'var(--accent)'">
        </div>
      </div>
    }

    @if (subText() || trendPct() !== null) {
      <div class="flex items-center gap-2 flex-wrap">

        @if (trendPct() !== null) {
          <span class="inline-flex items-center gap-1 px-2 py-[3px] rounded-full text-[12px] font-bold"
            [style.background]="trendBg()"
            [style.color]="trendColor()">
            <!-- freccia su/giù -->
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              @if (trendUp()) {
                <path d="M12 19V5M5 12l7-7 7 7"/>
              } @else {
                <path d="M12 5v14M5 12l7 7 7-7"/>
              }
            </svg>
            {{ trendText() }}
          </span>
        }

        @if (subText()) {
          <span class="text-[12.5px]" style="color:var(--text-3)">
            {{ subText() }}
            @if (subValue()) {
              <strong class="tnum font-semibold" style="color:var(--text-2)">{{ subValue() }}</strong>
            }
          </span>
        }

      </div>
    }

  </div>

</div>
